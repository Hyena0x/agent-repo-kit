name: agent-repo-kit

on:
  pull_request:
  workflow_dispatch:

jobs:
  verify:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Check generated adapters
        run: npm run adapters:check

      - name: Run tests
        run: npm test

      - name: Run publish-safety audit
        run: npm run audit:pack
