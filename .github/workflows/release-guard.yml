name: release-guard

on:
  pull_request:
  workflow_dispatch:

jobs:
  audit-pack:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install

      - name: Run release guard
        run: npm run audit:pack
